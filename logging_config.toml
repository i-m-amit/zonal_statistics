version = 1
disable_existing_loggers = false

# ─── FORMATTERS ──────────────────────────────────────────────
[formatters.colored]
"()"      = "colorlog.ColoredFormatter"
format    = "%(log_color)s%(asctime)s - \u001b[44m%(name)s\u001b[0m - %(levelname)s - %(message)s"
datefmt   = "%Y-%m-%d %H:%M:%S"

[formatters.colored.log_colors]
DEBUG     = "cyan"
INFO      = "green"
WARNING   = "yellow"
ERROR     = "red"
CRITICAL  = "bold_red"


# ─── HANDLERS ────────────────────────────────────────────────
[handlers.console]
class     = "logging.StreamHandler"
level     = "DEBUG"
formatter = "colored"
stream    = "ext://sys.stderr"

[handlers.file]
class     = "logging.FileHandler"
level     = "DEBUG"
formatter = "colored"
filename  = "zonal_stats.log"
mode      = "a"


# ─── LOGGERS ────────────────────────────────────────────────
[loggers.zs]
level     = "DEBUG"
handlers  = ["console", "file"]
propagate = false

[loggers.zonal_stats_app]
level     = "DEBUG"
handlers  = ["console", "file"]
propagate = false

[loggers.zsmap]
level     = "DEBUG"
handlers  = ["console", "file"]
propagate = false

[loggers.sepalui]
level     = "DEBUG"
handlers  = ["console"]
propagate = false


# ─── ROOT ───────────────────────────────────────────────────
[root]
level    = "WARNING"
handlers = ["console"]
